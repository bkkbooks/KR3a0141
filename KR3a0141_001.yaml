body:
  text: 阮子政論漁人張網于淵以制吞舟之魚明主張法于天下以制強梁之人立法以隄民百姓不能干立防以隄水江河不能犯防而可犯則江河成災法而可干則百姓成害馬總意林卷四不樹者死無棺不蠶者身無帛不績者凶無縗意林卷四君子暇豫則思義小人暇豫則思邪意林卷四高鳥相木而集智士擇土而翔同上一盜不誅害在穿窬修譽不誅害在詞主意林卷四交遊之黨為馳騖之所廢文選卷五十五劉孝標絕交論注裁國無利器猶鉛而而望其巧北堂書鈔卷二十七太平御覽卷二百四十六世多善弩而拙於弓弓無法準故任巧由意弩有法準故易有善太平御覽卷三百四十八夫交遊者儔黨結於家威權傾其國或以利厚而比或以名高相求同則譽廣異則毀深朝無兩端之議家有不協之論至今父子不同好兄弟異交友破和穆之道長爭訟之源太平御覽卷四百六雖金玉滿堂明珠滿室飢不為寶非國之用太平御覽卷八百二
